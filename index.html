<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Hand Gesture Controller</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Canvas Utama untuk Partikel 3D */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Kamera Box di Pojok Kiri Atas (Responsif) */
        .camera-box {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 160px;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 10;
            background: #111;
            transform: scaleX(-1); /* Mirroring kamera biar natural */
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Indikator Status & Mode (UI) */
        .ui-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            max-width: 90%;
        }

        #mode-label {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #00e5ff;
            text-transform: uppercase;
        }

        #status-label {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 4px;
        }

        /* Loading Screen Overlay */
        #loading {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #050505;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #00e5ff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Penyesuaian Responsif untuk Perangkat Mobile */
        @media (max-width: 768px) {
            .camera-box {
                width: 120px;
                height: 90px;
                top: 10px;
                left: 10px;
            }
            #mode-label {
                font-size: 0.85rem;
            }
            #status-label {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p>Memuat Model AI & Engine Grafis...</p>
    </div>

    <div class="camera-box">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div class="ui-panel">
        <div id="mode-label">Mode: Membuka Kamera...</div>
        <div id="status-label">Arahkan tangan ke kamera untuk mengontrol objek</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // ==========================================
        // KONFIGURASI GLOBAL & STATE
        // ==========================================
        const NUM_PARTICLES = 1500;
        const NUM_SPHERE = 700; // Untuk mode Saturnus

        let currentMode = 1;
        let targetMode = 1;
        let rotationAngle = 0;

        // Tracker Posisi Tangan Tiga Dimensi (Smoothing)
        let handPos = { x: 0, y: 0, z: -12 };
        let targetHandPos = { x: 0, y: 0, z: -12 };

        const modeLabels = {
            1: "ROTASI KOSMOS (Tangan Terbuka)",
            2: "SATURNUS 3D (Satu Jari / Telunjuk)",
            3: "TEKS 'I LOVE YOU' (Pose Peace)",
            4: "BENTUK HATI / LOVE (Tangan Mengepal)"
        };

        // Kumpulan Array Posisi Koordinat Bentuk
        const positions = {
            1: new Float32Array(NUM_PARTICLES * 3), // Kosmos
            2: new Float32Array(NUM_PARTICLES * 3), // Saturnus
            3: new Float32Array(NUM_PARTICLES * 3), // I Love You
            4: new Float32Array(NUM_PARTICLES * 3)  // Hati
        };

        // Array dinamis untuk interpolasi animasi partikel
        const currentPositions = new Float32Array(NUM_PARTICLES * 3);
        const particleColors = new Float32Array(NUM_PARTICLES * 3);

        // ==========================================
        // GENERASI DATA BENTUK 3D (Replikasi Logika Python)
        // ==========================================
        
        // Mode 1: Kosmos Acak
        for(let i=0; i < NUM_PARTICLES * 3; i++) {
            positions[1][i] = (Math.random() - 0.5) * 8.0;
        }

        // Mode 2: Saturnus (Bola Inti + Cincin datar)
        for(let i=0; i < NUM_PARTICLES; i++) {
            let i3 = i * 3;
            if (i < NUM_SPHERE) {
                // Pola Inti Bola
                let phi = Math.random() * Math.PI * 2;
                let costheta = (Math.random() * 2) - 1;
                let theta = Math.acos(costheta);
                let r = 1.3;
                positions[2][i3]   = r * Math.sin(theta) * Math.cos(phi);
                positions[2][i3+1] = r * Math.sin(theta) * Math.sin(phi);
                positions[2][i3+2] = r * Math.cos(theta);
            } else {
                // Pola Cincin Luar
                let theta = Math.random() * Math.PI * 2;
                let r = 1.8 + Math.random() * 2.0;
                positions[2][i3]   = r * Math.cos(theta);
                positions[2][i3+1] = (Math.random() - 0.5) * 0.1;
                positions[2][i3+2] = r * Math.sin(theta);
            }
        }

        // Mode 3: Tulisan "I LOVE YOU" (Metode Pemetaan Canvas 2D)
        const textCanvas = document.createElement('canvas');
        const tCtx = textCanvas.getContext('2d');
        textCanvas.width = 800;
        textCanvas.height = 200;
        tCtx.fillStyle = '#000';
        tCtx.fillRect(0,0,800,200);
        tCtx.fillStyle = '#fff';
        tCtx.font = 'bold 90px sans-serif';
        tCtx.fillText('I LOVE YOU', 40, 130);

        const imgData = tCtx.getImageData(0, 0, 800, 200).data;
        const textPoints = [];
        for (let y = 0; y < 200; y += 2) {
            for (let x = 0; x < 800; x += 2) {
                let idx = (y * 800 + x) * 4;
                if (imgData[idx] > 128) {
                    textPoints.push({
                        x: (x - 400) / 65.0,
                        y: -(y - 100) / 65.0,
                        z: (Math.random() - 0.5) * 0.2
                    });
                }
            }
        }
        for(let i=0; i < NUM_PARTICLES; i++) {
            let pt = textPoints[Math.floor(Math.random() * textPoints.length)] || {x:0, y:0, z:0};
            let i3 = i * 3;
            positions[3][i3]   = pt.x;
            positions[3][i3+1] = pt.y;
            positions[3][i3+2] = pt.z;
        }

        // Mode 4: Pola Hati / Love 3D Matematik
        for(let i=0; i < NUM_PARTICLES; i++) {
            let i3 = i * 3;
            let t = (Math.random() * Math.PI * 2) - Math.PI;
            let p = (Math.random() * Math.PI * 2) - Math.PI;
            
            let x = 2.0 * Math.pow(Math.sin(t), 3);
            let y = 2.0 * Math.cos(t) - 0.7 * Math.cos(2*t) - 0.3 * Math.cos(3*t) - 0.1 * Math.cos(4*t);
            let z = Math.sin(p) * 0.4;

            positions[4][i3]   = x * 0.85;
            positions[4][i3+1] = (y * 0.85) + 0.5;
            positions[4][i3+2] = z;
        }

        // Set Posisi Awal Partikel ke Posisi Kosmos
        for(let i=0; i<NUM_PARTICLES*3; i++) {
            currentPositions[i] = positions[1][i];
        }

        // ==========================================
        // PENYUSUNAN GRAFIS UTAMA (THREE.JS ENGINE)
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.z = 0; // Transformasi dikontrol via struktur matriks internal objek mirip glTranslatef python

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Inisialisasi Buffer Geometry untuk manajemen performa partikel tinggi
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

        // Tekstur lingkaran halus untuk partikel point
        const pTexture = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/sprites/disc.png');

        const material = new THREE.PointsMaterial({
            size: 0.18,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            map: pTexture,
            alphaTest: 0.01,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Fungsi pewarnaan partikel dinamis real-time berdasarkan state mode aktif
        function updateParticleColors(mode) {
            const colorsAttr = geometry.attributes.color;
            for(let i=0; i<NUM_PARTICLES; i++) {
                let i3 = i * 3;
                if(mode === 3) { // Teks: Cyan Neon
                    particleColors[i3] = 0.0; particleColors[i3+1] = 0.8; particleColors[i3+2] = 1.0;
                } else if(mode === 4) { // Love: Pink/Magenta
                    particleColors[i3] = 1.0; particleColors[i3+1] = 0.1; particleColors[i3+2] = 0.4;
                } else if(mode === 2) { // Saturnus
                    if(i >= NUM_SPHERE) { // Cincin: Gold Soft
                        particleColors[i3] = 1.0; particleColors[i3+1] = 0.7; particleColors[i3+2] = 0.3;
                    } else { // Inti: Oranye Terang
                        particleColors[i3] = 1.0; particleColors[i3+1] = 0.5; particleColors[i3+2] = 0.0;
                    }
                } else { // Kosmos: Biru Elektrik
                    particleColors[i3] = 0.1; particleColors[i3+1] = 0.5; particleColors[i3+2] = 1.0;
                }
            }
            colorsAttr.needsUpdate = true;
        }

        updateParticleColors(1);

        // ==========================================
        // LOGIKA DETEKSI GESTUR JARI (MEDIAPIPE)
        // ==========================================
        function hitungModeGestur(landmarks) {
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            let jariBerdiri = 0;

            for(let i=0; i<4; i++) {
                if(landmarks[tips[i]].y < landmarks[pips[i]].y) {
                    jariBerdiri++;
                }
            }

            // Aturan gestur disesuaikan dengan skrip python bawaan
            const indexUp = landmarks[8].y < landmarks[6].y;
            const middleUp = landmarks[12].y < landmarks[10].y;
            const ringUp = landmarks[16].y < landmarks[14].y;
            const pinkyUp = landmarks[20].y < landmarks[18].y;

            if (jariBerdiri === 0) return 4; // Genggam -> Hati
            if (indexUp && !middleUp && !ringUp && !pinkyUp) return 2; // Telunjuk -> Saturnus
            if (indexUp && middleUp && !ringUp && !pinkyUp) return 3; // Peace -> Teks
            return 1; // Default Tangan Terbuka -> Kosmos
        }

        const videoElement = document.getElementById('webcam');
        const modeLabel = document.getElementById('mode-label');

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            // Sembunyikan layer loading jika AI berhasil mendeteksi frame pertama
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                targetMode = hitungModeGestur(landmarks);

                // Ekstraksi posisi pergelangan tangan (wrist) untuk translasi objek 3D
                const wrist = landmarks[0];
                targetHandPos.x = (wrist.x - 0.5) * 12.0;
                targetHandPos.y = -(wrist.y - 0.5) * 8.0;

                // Hitung jarak pseudo-Z menggunakan Euclidean distance antara wrist ke pangkal kelingking
                const pinkyMcp = landmarks[17];
                const distance = Math.sqrt(Math.pow(wrist.x - pinkyMcp.x, 2) + Math.pow(wrist.y - pinkyMcp.y, 2));
                targetHandPos.z = -10.0 - (1.0 / (distance + 0.01)) * 0.18;
            } else {
                // Jika tidak ada tangan, balikkan ke konfigurasi dasar kosmos di tengah screen
                targetMode = 1;
                targetHandPos.x = 0;
                targetHandPos.y = 0;
                targetHandPos.z = -12;
            }

            if(currentMode !== targetMode) {
                currentMode = targetMode;
                modeLabel.innerText = `Mode: ${modeLabels[currentMode]}`;
                updateParticleColors(currentMode);
            }
        });

        // Loop penangkapan frame video kamera lokal
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 480,
            height: 360
        });
        cameraUtils.start();

        // ==========================================
        // RENDER LOOP & ANIMASI INTERPOLASI (LERP)
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            // Interpolasi Linier (Smoothing pergerakan translasi tangan)
            handPos.x += (targetHandPos.x - handPos.x) * 0.15;
            handPos.y += (targetHandPos.y - handPos.y) * 0.15;
            handPos.z += (targetHandPos.z - handPos.z) * 0.15;

            // Logika Kecepatan Rotasi Otomatis berdasarkan Mode Aktif
            if (currentMode === 1) {
                rotationAngle += 0.008;
            } else if (currentMode === 2) {
                rotationAngle += 0.03;
            } else if (currentMode === 3) {
                rotationAngle = 0; // Statis agar teks mudah dibaca dari depan
            } else if (currentMode === 4) {
                rotationAngle += 0.02;
            }

            // Transformasi matriks sistem partikel berdasarkan mode koordinat
            particleSystem.rotation.y = rotationAngle;

            if (currentMode in [2, 3, 4] || currentMode !== 1) {
                particleSystem.position.set(handPos.x, handPos.y, handPos.z);
                if(currentMode === 2) {
                    particleSystem.rotation.x = 0.4; // Kemiringan sumbu cincin saturnus
                } else {
                    particleSystem.rotation.x = 0;
                }
            } else {
                // Default Mode Kosmos: Tetap stabil di poros tengah layar
                particleSystem.position.set(0, 0, -12);
                particleSystem.rotation.x = 0;
            }

            // Interpolasi posisi partikel per titik (Morphing transition effect)
            const posAttr = geometry.attributes.position;
            const targetPositionsArray = positions[currentMode];

            for (let i = 0; i < NUM_PARTICLES * 3; i++) {
                currentPositions[i] += (targetPositionsArray[i] - currentPositions[i]) * 0.12;
            }
            posAttr.needsUpdate = true;

            renderer.render(scene, camera);
        }

        animate();

        // ==========================================
        // HANDLING RESPONSIVE WINDOW RESIZE
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
