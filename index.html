<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Particle Gesture + Living Flower Bouquet</title>
    
    <!-- Mediapipe & Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050b12;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Panel kontrol kamera & status */
        .control-panel {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .camera-box {
            position: relative;
            width: 160px;
            height: 120px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,240,0.25);
            background: #000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            transform: scaleX(-1);
            backdrop-filter: blur(2px);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #hand-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .mini-popup {
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,200,0.2);
            color: #fff;
            font-weight: 500;
            width: max-content;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .mini-popup .title {
            font-size: 0.6rem;
            letter-spacing: 1px;
            color: #b0f0ff;
            text-transform: uppercase;
        }

        .mini-popup .mode-text {
            font-size: 0.75rem;
            font-weight: 600;
            color: #ffd966;
            margin-top: 2px;
        }

        #loading {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0f1a, #000000);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0,229,255,0.2);
            border-radius: 50%;
            border-top-color: #00e5ff;
            animation: spin 0.9s infinite linear;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* =================================================
           BUNGA & KUPU-KUPU CSS (style smooth yg dipertahankan)
        ================================================= */
        .flowers-container-bridge {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flowers {
            position: absolute;
            transform-origin: bottom center;
            opacity: 0;
            transform: translate(-50%, -20%) scale(0);
            transition: transform 0.45s cubic-bezier(0.34, 1.3, 0.64, 1), opacity 0.35s ease;
            width: 0;
            height: 0;
            filter: drop-shadow(0 8px 18px rgba(0,0,0,0.3));
        }

        .flowers.active {
            opacity: 1;
            transition: transform 0.4s cubic-bezier(0.2, 1.2, 0.3, 1), opacity 0.3s;
        }

        /* struktur bunga (tetap seperti asli, tanpa perubahan) */
        .flower { position: absolute; bottom: 10vmin; transform-origin: bottom center; z-index: 10; --fl-speed: 0.8s; }
        .flower--6 { left: -20vmin; transform: rotate(-26deg); animation: moving-flower-left-deep 4.4s linear infinite; }
        .flower--1 { left: -14vmin; transform: rotate(-19deg); animation: moving-flower-left 4s linear infinite; }
        .flower--4 { left: -8vmin; transform: rotate(-11deg); animation: moving-flower-left-soft 4.2s linear infinite; }
        .flower--8 { left: -4vmin; transform: rotate(-5deg); animation: moving-flower-left-soft 3.9s linear infinite; }
        .flower--2 { left: 0vmin; transform: rotate(0deg); animation: moving-flower-center 4.5s linear infinite; }
        .flower--9 { left: 4vmin; transform: rotate(5deg); animation: moving-flower-right-soft 4.3s linear infinite; }
        .flower--5 { left: 8vmin; transform: rotate(11deg); animation: moving-flower-right-soft 3.8s linear infinite; }
        .flower--3 { left: 14vmin; transform: rotate(19deg); animation: moving-flower-right 4s linear infinite; }
        .flower--7 { left: 20vmin; transform: rotate(26deg); animation: moving-flower-right-deep 4.1s linear infinite; }

        .flower__leafs { position: relative; animation: blooming-flower 2s backwards; }
        .flower__leaf { position: absolute; bottom: 0; left: 50%; width: 8vmin; height: 11vmin; border-radius: 51% 49% 47% 53%/44% 45% 55% 69%; transform-origin: bottom center; opacity: 0.95; box-shadow: inset 0 0 2vmin rgba(255,255,240,0.6); }
        .flower__leaf--1 { transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
        .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
        .flower__leaf--3 { transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
        .flower__leaf--4 { width: 8vmin; height: 8vmin; transform-origin: bottom left; border-radius: 4vmin 10vmin 4vmin 4vmin; transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg); }
        .theme-pink .flower__leaf { background: linear-gradient(145deg, #ffb7c5, #ff69b4); }
        .theme-blue .flower__leaf { background: linear-gradient(145deg, #b0f0ff, #289fb0); }
        .theme-yellow .flower__leaf { background: linear-gradient(145deg, #fff0a5, #f5c542); }
        .flower__white-circle { position: absolute; left: -3.5vmin; top: -3vmin; width: 9vmin; height: 4vmin; border-radius: 50%; background: #fff9e0; }
        .flower__white-circle::after { content: ""; position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 60%; height: 60%; border-radius: inherit; background: radial-gradient(circle, #ffdd77, #ffb347); }
        .flower__line { width: 1.2vmin; height: 100%; background: linear-gradient(to top, transparent 10%, #14757a, #4ad4e6); box-shadow: inset 0 0 3px rgba(0,0,0,0.4); animation: grow-flower-tree 4s backwards; }
        .flower__line__leaf { --w: 5.5vmin; --h: calc(var(--w) + 2vmin); position: absolute; background: linear-gradient(145deg, #2ca5af, #6adbe8); opacity: 0.9; border-radius: 30% 70% 50% 50%; }
        .flower__line__leaf--1 { top: 25%; left: 80%; width: var(--w); height: var(--h); transform: rotate(55deg); animation: blooming-leaf-right var(--fl-speed) 1.6s backwards; }
        .flower__line__leaf--2 { top: 45%; left: 80%; transform: rotate(50deg); animation: blooming-leaf-right var(--fl-speed) 1.8s backwards; }
        .flower__line__leaf--3 { top: 15%; left: -380%; width: var(--w); height: var(--h); transform: rotate(-50deg); animation: blooming-leaf-left var(--fl-speed) 1.2s backwards; }
        .flower__line__leaf--4 { top: 35%; left: -380%; transform: rotate(-55deg); animation: blooming-leaf-left var(--fl-speed) 1.4s backwards; }
        .flower__light { position: absolute; bottom: 0; width: 1.2vmin; height: 1.2vmin; background: #ffea80; border-radius: 50%; filter: blur(0.2vmin); animation: light-ans 4s linear infinite; }
        
        /* kupu-kupu & efek */
        .butterfly-system { position: absolute; top: -105vmin; left: 50%; transform: translateX(-50%); width: 60vmin; height: 30vmin; z-index: 99; transform-style: preserve-3d; }
        .butterfly-holder { position: absolute; width: 5vmin; height: 5vmin; transform-style: preserve-3d; top: 50%; left: 50%; }
        .bf-1 { animation: smooth-orbit-1 6s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; --bf-color: #ff85c1; --bf-glow: #ff3b9b; }
        .bf-2 { animation: smooth-orbit-2 6.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; animation-delay: -3.2s; --bf-color: #5ac8fa; --bf-glow: #00c3ff; }
        .butterfly { position: relative; width: 100%; height: 100%; }
        .butterfly__body { position: absolute; top: 50%; left: 50%; width: 0.6vmin; height: 2.8vmin; background: #2c2c2c; border-radius: 40%; transform: translate(-50%, -50%); box-shadow: 0 0 0.6vmin white; }
        .butterfly__wing { position: absolute; top: -0.5vmin; width: 4vmin; height: 3.8vmin; border-radius: 50% 50% 40% 60%; filter: drop-shadow(0 0 0.6vmin var(--bf-glow)); }
        .wing-left { right: 50%; background: linear-gradient(135deg, var(--bf-color), rgba(255,255,240,0.9)); transform-origin: right center; animation: flap-left 0.12s ease-in-out infinite alternate; }
        .wing-right { left: 50%; background: linear-gradient(225deg, var(--bf-color), rgba(255,255,240,0.9)); transform-origin: left center; animation: flap-right 0.12s ease-in-out infinite alternate; }
        .trail-container .sparkle { position: absolute; width: 0.7vmin; height: 0.7vmin; border-radius: 50%; background: #fff; filter: blur(0.2vmin); animation: particle-fade 0.7s linear infinite; }
        
        .nametag-ribbon { position: absolute; bottom: 6vmin; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #fff0f5, #ffe4e1); color: #b13e5c; font-family: 'Georgia', cursive; font-weight: bold; font-size: 2.2vmin; padding: 1.2vmin 5vmin; border-radius: 40px; box-shadow: 0 0 20px rgba(255,200,230,0.6); white-space: nowrap; backdrop-filter: blur(4px); z-index: 100; }
        
        /* keyframes lengkap */
        @keyframes blooming-flower { 0% { transform: scale(0); opacity: 0; } }
        @keyframes blooming-leaf-right { 0% { transform: rotate(55deg) scale(0); } }
        @keyframes blooming-leaf-left { 0% { transform: rotate(-50deg) scale(0); } }
        @keyframes grow-flower-tree { 0% { height: 0; } }
        @keyframes moving-flower-left-deep { 0%, 100% { transform: rotate(-26deg); } 50% { transform: rotate(-24deg); } }
        @keyframes moving-flower-left { 0%, 100% { transform: rotate(-19deg); } 50% { transform: rotate(-17deg); } }
        @keyframes moving-flower-left-soft { 0%, 100% { transform: rotate(-11deg); } 50% { transform: rotate(-9deg); } }
        @keyframes moving-flower-center { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
        @keyframes moving-flower-right-soft { 0%, 100% { transform: rotate(5deg); } 50% { transform: rotate(3deg); } }
        @keyframes moving-flower-right { 0%, 100% { transform: rotate(19deg); } 50% { transform: rotate(17deg); } }
        @keyframes moving-flower-right-deep { 0%, 100% { transform: rotate(26deg); } 50% { transform: rotate(24deg); } }
        @keyframes light-ans { 0% { opacity: 0; transform: translateY(0px); } 25% { opacity: 1; } 100% { opacity: 0; transform: translateY(-80vmin) translateX(10vmin); filter: blur(0.5vmin); } }
        @keyframes flap-left { 0% { transform: rotateY(15deg); } 100% { transform: rotateY(85deg); } }
        @keyframes flap-right { 0% { transform: rotateY(-15deg); } 100% { transform: rotateY(-85deg); } }
        @keyframes smooth-orbit-1 { 0% { transform: translate3d(-22vmin, 2vmin, 0vmin) rotateY(0deg); } 50% { transform: translate3d(22vmin, 4vmin, 0vmin) rotateY(180deg); } 100% { transform: translate3d(-22vmin, 2vmin, 0vmin) rotateY(360deg); } }
        @keyframes smooth-orbit-2 { 0% { transform: translate3d(20vmin, -4vmin, 5vmin) rotateY(180deg); } 50% { transform: translate3d(-20vmin, -2vmin, 5vmin) rotateY(360deg); } 100% { transform: translate3d(20vmin, -4vmin, 5vmin) rotateY(540deg); } }
        @keyframes particle-fade { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: translate(-2vmin, 5vmin) scale(0); } }
        
        @media (max-width: 550px) {
            .camera-box { width: 120px; height: 90px; }
            .nametag-ribbon { font-size: 2vmin; padding: 1vmin 3.5vmin; }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p id="loading-text" style="font-size: 0.9rem; color: #b0e0ff;">Menyiapkan kecantikan bunga & AI tangan ...</p>
</div>

<div class="control-panel">
    <div class="camera-box">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="hand-canvas"></canvas>
    </div>
    <div class="mini-popup">
        <div class="title">✨ Gerakan Ajaib ✨</div>
        <div id="mode-label" class="mode-text">Memuat gestur...</div>
    </div>
</div>

<div class="flowers-container-bridge">
    <div id="css-bouquet" class="flowers">
        <!-- kupu-kupu -->
        <div class="butterfly-system">
            <div class="butterfly-holder bf-1"><div class="butterfly"><div class="butterfly__wing wing-left"></div><div class="butterfly__body"></div><div class="butterfly__wing wing-right"></div></div><div class="trail-container"><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div></div></div>
            <div class="butterfly-holder bf-2"><div class="butterfly"><div class="butterfly__wing wing-left"></div><div class="butterfly__body"></div><div class="butterfly__wing wing-right"></div></div><div class="trail-container"><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div></div></div>
        </div>
        <!-- bunga-bunga eksotis -->
        <div class="flower flower--1 theme-pink"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div><div class="flower__light"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--1"></div><div class="flower__line__leaf flower__line__leaf--3"></div></div></div>
        <div class="flower flower--2 theme-blue"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div><div class="flower__light"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--1"></div><div class="flower__line__leaf flower__line__leaf--2"></div><div class="flower__line__leaf flower__line__leaf--3"></div></div></div>
        <div class="flower flower--3 theme-yellow"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div><div class="flower__light"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--2"></div><div class="flower__line__leaf flower__line__leaf--4"></div></div></div>
        <div class="flower flower--4 theme-pink"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--1"></div></div></div>
        <div class="flower flower--5 theme-yellow"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--2"></div><div class="flower__line__leaf flower__line__leaf--3"></div></div></div>
        <div class="flower flower--6 theme-blue"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--3"></div></div></div>
        <div class="flower flower--7 theme-pink"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--1"></div><div class="flower__line__leaf flower__line__leaf--2"></div></div></div>
        <div class="flower flower--8 theme-blue"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--5"></div></div></div>
        <div class="flower flower--9 theme-pink"><div class="flower__leafs"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div><div class="flower__line"><div class="flower__line__leaf flower__line__leaf--6"></div></div></div>
        <div class="flower__grass flower__grass--1"><div class="flower__grass--top"></div><div class="flower__grass--bottom"></div></div>
        <div class="nametag-ribbon">🌹 AURANURHIDAYAH 🌹</div>
    </div>
</div>

<div id="canvas-container"></div>

<script>
    (function(){
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const PARTICLE_COUNT = 1500;
        const SPHERE_COUNT = 700;
        
        let currentMode = 1;
        let targetMode = 1;
        let rotationAngle = 0;
        
        // data partikel tiga mode (positions[1..5])
        const positions = {1: new Float32Array(PARTICLE_COUNT*3),2: new Float32Array(PARTICLE_COUNT*3),3: new Float32Array(PARTICLE_COUNT*3),4: new Float32Array(PARTICLE_COUNT*3),5: new Float32Array(PARTICLE_COUNT*3)};
        const currentPositions = new Float32Array(PARTICLE_COUNT*3);
        const particleColors = new Float32Array(PARTICLE_COUNT*3);
        
        // spread dasar
        const spread = isMobile ? 3.2 : 4.6;
        for(let i=0; i<PARTICLE_COUNT*3; i++) positions[1][i] = (Math.random() - 0.5) * spread * 2;
        
        // mode2: saturn ring + core
        for(let i=0; i<PARTICLE_COUNT; i++) {
            let i3 = i*3;
            if(i < SPHERE_COUNT) {
                let theta = Math.acos(2*Math.random()-1);
                let phi = 2*Math.PI*Math.random();
                let r = 1.25 * (isMobile?0.9:1);
                positions[2][i3] = r*Math.sin(theta)*Math.cos(phi);
                positions[2][i3+1] = r*Math.sin(theta)*Math.sin(phi);
                positions[2][i3+2] = r*Math.cos(theta);
            } else {
                let ang = 2*Math.PI*Math.random();
                let rad = (1.6 + Math.random()*2.2) * (isMobile?0.9:1);
                positions[2][i3] = rad*Math.cos(ang);
                positions[2][i3+1] = (Math.random()-0.5)*0.2;
                positions[2][i3+2] = rad*Math.sin(ang);
            }
        }
        // mode3: I LOVE YOU text points
        const textCanvas = document.createElement('canvas');
        const tCtx = textCanvas.getContext('2d');
        textCanvas.width = 600; textCanvas.height = 150;
        tCtx.fillStyle = 'black'; tCtx.fillRect(0,0,600,150);
        tCtx.fillStyle = 'white'; tCtx.font = 'bold 66px "Segoe UI"'; tCtx.textAlign='center'; tCtx.textBaseline='middle';
        tCtx.fillText('I LOVE YOU',300,75);
        const imgData = tCtx.getImageData(0,0,600,150).data;
        let pointsArray = [];
        for(let y=0;y<150;y+=2) for(let x=0;x<600;x+=2) if(imgData[(y*600+x)*4] > 100) pointsArray.push({x:(x-300)/56, y:-(y-75)/56, z:(Math.random()-0.5)*0.2});
        for(let i=0;i<PARTICLE_COUNT;i++) {
            let p = pointsArray[i%pointsArray.length];
            positions[3][i*3] = p.x; positions[3][i*3+1] = p.y; positions[3][i*3+2] = p.z;
        }
        // mode4: love heart 3D
        for(let i=0;i<PARTICLE_COUNT;i++) {
            let t = Math.random()*Math.PI*2;
            let x = 2.2*Math.pow(Math.sin(t),3);
            let y = 1.8*Math.cos(t) - 0.5*Math.cos(2*t) - 0.2*Math.cos(3*t);
            positions[4][i*3] = x * 0.75; positions[4][i*3+1] = (y+0.6)*0.9; positions[4][i*3+2] = (Math.random()-0.5)*0.45;
        }
        // mode5 : kita buat partikel latar menjadi sangat lembut & transparan (hampir tak terlihat) tapi tetap ada efek bercahaya tipis
        // TAPI sesuai permintaan: "particlenya masih ada dan malah jadi jelek, ubah style bunganya jadi particle juga"
        // agar tidak mengganggu buket bunga CSS, kita akan SET VISIBLE FALSE saat mode5, tapi jika ingin tetap ada efek halus, kita buat partikel mode5 menjadi sangat kecil dan transparan.
        for(let i=0;i<PARTICLE_COUNT;i++) {
            let theta = Math.random()*Math.PI*2;
            let r = 0.9 + Math.random()*2.2;
            positions[5][i*3] = Math.cos(theta)*r * (isMobile?0.7:1);
            positions[5][i*3+1] = (Math.random()-0.5)*2.2;
            positions[5][i*3+2] = Math.sin(theta)*r * (isMobile?0.7:1);
        }
        
        for(let i=0;i<PARTICLE_COUNT*3;i++) currentPositions[i] = positions[1][i];
        
        // setup THREE
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010518);
        const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.1, 40);
        camera.position.z = 0;
        const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio,2));
        container.appendChild(renderer.domElement);
        
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleTexture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/disc.png');
        const particleMaterial = new THREE.PointsMaterial({size: isMobile?0.12:0.16, vertexColors:true, transparent:true, opacity:0.9, map:particleTexture, blending:THREE.AdditiveBlending, depthWrite:false});
        const particleSystem = new THREE.Points(geometry, particleMaterial);
        scene.add(particleSystem);
        
        function updateColors(mode){
            const colorAttr = geometry.attributes.color;
            for(let i=0;i<PARTICLE_COUNT;i++){
                let i3=i*3;
                if(mode===5){
                    // mode bunga: warna pastel lembut, tapi karena nanti kami sembunyikan, ini tidak masalah
                    particleColors[i3]=0.9; particleColors[i3+1]=0.6; particleColors[i3+2]=0.8;
                } else if(mode===3){
                    particleColors[i3]=0.2; particleColors[i3+1]=0.9; particleColors[i3+2]=1.0;
                } else if(mode===4){
                    particleColors[i3]=1.0; particleColors[i3+1]=0.2; particleColors[i3+2]=0.4;
                } else if(mode===2){
                    if(i<SPHERE_COUNT){ particleColors[i3]=1.0; particleColors[i3+1]=0.6; particleColors[i3+2]=0.2; }
                    else { particleColors[i3]=1.0; particleColors[i3+1]=0.8; particleColors[i3+2]=0.4; }
                } else {
                    particleColors[i3]=0.1; particleColors[i3+1]=0.5; particleColors[i3+2]=1.0;
                }
            }
            colorAttr.needsUpdate = true;
        }
        updateColors(1);
        
        // Mediapipe gesture logic
        const video = document.getElementById('webcam');
        const handCanvas = document.getElementById('hand-canvas');
        const ctxHand = handCanvas.getContext('2d');
        const modeLabelDiv = document.getElementById('mode-label');
        const cssBouquet = document.getElementById('css-bouquet');
        const loadingDiv = document.getElementById('loading');
        
        let gestureBuffer = [];
        let handPosition3D = {x:0,y:0,z:-12};
        let targetHand3D = {x:0,y:0,z:-12};
        let cssTrack = {x:window.innerWidth/2, y:window.innerHeight/2, scale:0};
        let targetCss = {x:window.innerWidth/2, y:window.innerHeight/2, scale:0};
        
        function detectGesture(landmarks){
            const tips = [8,12,16,20];
            const pips = [6,10,14,18];
            let extended=0;
            for(let i=0;i<4;i++) if(landmarks[tips[i]].y < landmarks[pips[i]].y) extended++;
            const idxUp = landmarks[8].y < landmarks[6].y;
            const midUp = landmarks[12].y < landmarks[10].y;
            if(extended === 4) return 5;      // tangan terbuka penuh -> Buket bunga
            if(extended === 0) return 4;      // kepal -> love hati
            if(idxUp && !midUp) return 2;     // telunjuk -> saturnus
            if(idxUp && midUp) return 3;      // peace -> I love you
            return 1;
        }
        
        const hands = new Hands({locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({maxNumHands:1, modelComplexity:isMobile?0:1, minDetectionConfidence:0.7, minTrackingConfidence:0.7});
        
        function hideLoader(){
            if(loadingDiv && loadingDiv.style.display !== 'none'){
                loadingDiv.style.opacity = '0';
                setTimeout(()=>{ if(loadingDiv) loadingDiv.style.display = 'none'; }, 500);
            }
        }
        
        hands.onResults((res)=>{
            hideLoader();
            ctxHand.clearRect(0,0,handCanvas.width,handCanvas.height);
            if(res.multiHandLandmarks && res.multiHandLandmarks.length){
                const lm = res.multiHandLandmarks[0];
                let raw = detectGesture(lm);
                gestureBuffer.push(raw);
                if(gestureBuffer.length>6) gestureBuffer.shift();
                let freq={}; let maxFreq=raw, maxCount=0;
                for(let v of gestureBuffer){ freq[v]=(freq[v]||0)+1; if(freq[v]>maxCount){ maxCount=freq[v]; maxFreq=v; } }
                targetMode = maxFreq;
                drawConnectors(ctxHand, lm, HAND_CONNECTIONS, {color:'#88ffdd', lineWidth:2.5});
                drawLandmarks(ctxHand, lm, {color:'#ffffff', radius:2});
                
                const wrist = lm[0];
                const px = (wrist.x-0.5)*(isMobile?8:12);
                const py = -(wrist.y-0.5)*(isMobile?6:9);
                targetHand3D.x = px; targetHand3D.y = py;
                const pinkyMcp = lm[17];
                const dist = Math.hypot(wrist.x-pinkyMcp.x, wrist.y-pinkyMcp.y);
                targetHand3D.z = -10 - (1/(dist+0.02))*0.25;
                
                // posisi CSS bouquet ikuti tangan (dengan offset cantik)
                targetCss.x = (1.0 - wrist.x) * window.innerWidth;
                targetCss.y = wrist.y * window.innerHeight + window.innerHeight*0.05;
                if(targetMode === 5){
                    targetCss.scale = Math.min(1.1, (dist * 2.2)) * (isMobile?1.2:1.3);
                    cssBouquet.classList.add('active');
                } else {
                    targetCss.scale = 0;
                    cssBouquet.classList.remove('active');
                }
            } else {
                gestureBuffer = [];
                targetMode = 1;
                targetHand3D = {x:0,y:0,z:isMobile?-10:-12};
                targetCss.scale = 0;
                cssBouquet.classList.remove('active');
            }
            if(currentMode !== targetMode){
                currentMode = targetMode;
                const modeNames = {1:"✨ KOSMOS (Default)",2:"🪐 RING SATURNUS",3:"💖 I LOVE YOU",4:"❤️ LOVE HEART",5:"🌸 BUKET BUNGA Ajaib"};
                modeLabelDiv.innerText = modeNames[currentMode] || "Mode";
                updateColors(currentMode);
            }
        });
        
        async function startCam(){
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user", width:{ideal:480}, height:{ideal:360}}});
                video.srcObject = stream;
                const cam = new Camera(video, {onFrame: async ()=>{
                    if(handCanvas.width !== video.videoWidth){ handCanvas.width = video.videoWidth; handCanvas.height = video.videoHeight; }
                    await hands.send({image:video});
                }});
                await cam.start();
                hideLoader();
            } catch(e){
                console.warn(e);
                document.getElementById('loading-text').innerHTML = '⚠️ Izin kamera diperlukan untuk sihir tangan! <br> Izinkan lalu refresh.';
            }
        }
        startCam();
        
        // ** PERUBAHAN UTAMA: Pada mode 5 (tangan terbuka) kita sembunyikan partikel three.js karena mengganggu keindahan buket CSS **
        // Tapi jika ingin partikel tetap ada sebagai efek latar yang halus, kita set opacity ke 0 atau visible false.
        // Sesuai keluhan "particle nya masih ada dan malah jadi jelek", maka kita sembunyikan total saat mode5.
        let lastMode = 1;
        
        function animateScene(){
            requestAnimationFrame(animateScene);
            // smoothing posisi tangan 3D
            handPosition3D.x += (targetHand3D.x - handPosition3D.x)*0.12;
            handPosition3D.y += (targetHand3D.y - handPosition3D.y)*0.12;
            handPosition3D.z += (targetHand3D.z - handPosition3D.z)*0.12;
            // smoothing css bouquet
            cssTrack.x += (targetCss.x - cssTrack.x)*0.13;
            cssTrack.y += (targetCss.y - cssTrack.y)*0.13;
            cssTrack.scale += (targetCss.scale - cssTrack.scale)*0.15;
            cssBouquet.style.left = `${cssTrack.x}px`;
            cssBouquet.style.top = `${cssTrack.y}px`;
            cssBouquet.style.transform = `translate(-50%, -80%) scale(${cssTrack.scale})`;
            
            // kontrol partikel three.js sesuai mode: jika mode 5 maka partikel tidak terlihat
            if(currentMode === 5) {
                if(particleSystem.visible !== false) particleSystem.visible = false;
            } else {
                if(particleSystem.visible !== true) particleSystem.visible = true;
            }
            
            // Update posisi partikel hanya jika visible atau untuk mode non-5
            if(currentMode !== 5 || particleSystem.visible) {
                const targetArr = positions[currentMode];
                const posAttr = geometry.attributes.position.array;
                for(let i=0;i<PARTICLE_COUNT*3;i++) {
                    currentPositions[i] += (targetArr[i] - currentPositions[i]) * 0.12;
                    posAttr[i] = currentPositions[i];
                }
                geometry.attributes.position.needsUpdate = true;
            }
            
            // rotasi & posisi partikel system
            if(currentMode === 1) rotationAngle += 0.005;
            else if(currentMode === 2) rotationAngle += 0.022;
            else if(currentMode === 3) rotationAngle = 0;
            else if(currentMode === 4) rotationAngle += 0.012;
            else if(currentMode === 5) rotationAngle += 0.003;
            
            particleSystem.rotation.y = rotationAngle;
            if(currentMode !== 1 && currentMode !== 5){
                particleSystem.position.set(handPosition3D.x, handPosition3D.y, handPosition3D.z);
                particleSystem.rotation.x = (currentMode===2)?0.3:0;
            } else if(currentMode === 1){
                particleSystem.position.set(0,0, isMobile?-10:-12);
                particleSystem.rotation.x = 0;
            }
            // mode 5 posisi tidak penting karena tidak terlihat
            renderer.render(scene, camera);
        }
        animateScene();
        
        window.addEventListener('resize',()=>{
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth,window.innerHeight);
        });
        
        // pastikan loading hilang setelah 3 detik jika ada error
        setTimeout(hideLoader, 4000);
    })();
</script>
</body>
</html>
